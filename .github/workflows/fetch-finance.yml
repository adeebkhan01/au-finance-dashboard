name: Fetch Finance Data

on:
  schedule:
    - cron: '30 */3 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Australian economy data
        run: node fetch-finance.js

      - name: Commit finance-data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add finance-data.json
          git diff --staged --quiet || git commit -m "chore: refresh finance data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

