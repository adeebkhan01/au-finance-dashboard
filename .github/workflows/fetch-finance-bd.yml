name: Fetch BD Finance Data

on:
  schedule:
    # Runs every 6 hours at :05 past the hour (offset from AU workflow to avoid overlap)
    - cron: '5 0,6,12,18 * * *'
  workflow_dispatch:
    # Allow manual runs from the Actions tab at any time

env:
  # Set this to the folder where bd-fetch-finance.js lives relative to repo root.
  # If the file is at the root, set to: .
  SCRIPT_DIR: .

jobs:
  fetch-bd-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write   # needed to commit bd-finance-data.json back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Bangladesh data fetcher
        working-directory: ${{ env.SCRIPT_DIR }}
        run: node bd-fetch.js

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Only commit if the file actually changed
          if git diff --quiet "${{ env.SCRIPT_DIR }}/bd-fetch.json"; then
            echo "No changes to bd-fetch.json — skipping commit."
          else
            git add "${{ env.SCRIPT_DIR }}/bd-fetch.json"
            git commit -m "chore: refresh BD finance data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
