<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Australian Economy Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f2eb;--surface:#edeade;--card:#fff;--border:#ddd9cf;
  --green:#1a7a4a;--green-lt:#22915c;--green-dim:#e6f2ec;
  --red:#c23a3a;--red-dim:#fdf0f0;
  --text:#1a1a18;--muted:#7a7568;
  --blue:#2563eb;--blue-dim:#eff6ff;
  --gold:#b8860b;--gold-dim:#fef9ee;
  --purple:#7c3aed;--purple-dim:#f3f0f9;
  --serif:'Playfair Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --mono:'DM Mono',monospace;
  --radius:10px;--shadow:0 1px 3px rgba(0,0,0,.04);--shadow-lg:0 8px 24px rgba(0,0,0,.09);
  --hdr:50px;--ticker:34px;--scroll-offset:88px;
}
.dark{
  --bg:#131313;--surface:#1c1c1c;--card:#222;--border:#2e2e2e;
  --text:#e8e6e1;--muted:#8a8578;
  --green-dim:#162a1e;--red-dim:#2a1616;--blue-dim:#16192a;
  --gold-dim:#2a2516;--purple-dim:#201628;
  --shadow:0 1px 3px rgba(0,0,0,.25);--shadow-lg:0 8px 24px rgba(0,0,0,.35);
}
html{font-size:16px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-weight:300;transition:background .3s,color .3s;padding-top:0}

/* ── Masthead ─────────────────────────────────────────── */
.masthead{position:sticky;top:0;z-index:200;border-bottom:1px solid var(--border);background:var(--surface);padding:0 1.25rem;transition:background .3s,border-color .3s}
.masthead-inner{display:flex;align-items:center;gap:.55rem;height:var(--hdr)}
.logo{font-family:var(--serif);font-size:1.05rem;font-weight:700;color:var(--green);letter-spacing:-.02em;display:flex;align-items:center;gap:.4rem;text-decoration:none;white-space:nowrap;flex-shrink:0}
.au-flag{width:24px;height:14px;border-radius:2px;overflow:hidden;flex-shrink:0;background:#00008B}
.au-flag svg{width:100%;height:100%}
.slide-nav{display:flex;align-items:center;gap:.18rem;margin-left:.35rem;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.slide-nav::-webkit-scrollbar{display:none}
.snav-btn{padding:.22rem .5rem;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.62rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:var(--mono);flex-shrink:0}
.snav-btn:hover{border-color:var(--green);color:var(--green)}
.snav-btn.active{background:var(--green);border-color:var(--green);color:#fff}
.mhd-right{margin-left:auto;display:flex;align-items:center;gap:.45rem;flex-shrink:0}
.last-upd{font-size:.62rem;color:var(--muted);font-family:var(--mono);white-space:nowrap}
.btn-icon{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.btn-icon:hover{border-color:var(--green);color:var(--green)}
#refresh-btn{font-size:.68rem;font-weight:500;background:var(--green);color:#fff;border:1px solid var(--green);border-radius:6px;padding:.25rem .55rem;cursor:pointer;display:flex;align-items:center;gap:.3rem;transition:background .15s}
#refresh-btn:hover{background:#155f39}
#refresh-btn.spinning svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Ticker ───────────────────────────────────────────── */
.ticker{position:sticky;top:var(--hdr);z-index:199;background:var(--card);border-bottom:1px solid var(--border);padding:.35rem 1.25rem;overflow:hidden;transition:background .3s}
.ticker-inner{display:flex;gap:1.1rem;align-items:center;font-size:.67rem;font-family:var(--mono);overflow-x:auto;scrollbar-width:none}
.ticker-inner::-webkit-scrollbar{display:none}
.titem{display:flex;align-items:center;gap:.3rem;white-space:nowrap;flex-shrink:0}
.tname{color:var(--muted);font-weight:500}
.tchg.up{color:var(--green)}.tchg.down{color:var(--red)}
.tsep{width:1px;height:11px;background:var(--border);flex-shrink:0}

/* ── Slides (scrollable, stacked) ────────────────────── */
.slide{padding:1.5rem 1.25rem 2rem;border-bottom:2px solid var(--border);scroll-margin-top:var(--scroll-offset)}
.slide:last-child{border-bottom:none}

/* ── Slide header ─────────────────────────────────────── */
.slide-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1rem}
.slide-hdr-left{}
.slide-num-label{font-size:.6rem;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem}
.slide-title{font-family:var(--serif);font-size:1.4rem;font-weight:700;line-height:1.2}
.slide-sub{font-size:.72rem;color:var(--muted);margin-top:.25rem}
.slide-asof{font-size:.6rem;font-family:var(--mono);color:var(--muted);text-align:right;flex-shrink:0;white-space:nowrap}

/* ── Cards & chips ────────────────────────────────────── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:.85rem 1rem;box-shadow:var(--shadow);transition:all .2s}
.card:hover{border-color:var(--green-lt);transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.card-label{font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:.4rem;display:flex;align-items:center;gap:.3rem}
.card-label .dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.card-val{font-family:var(--serif);font-size:1.6rem;font-weight:700;line-height:1.1;letter-spacing:-.02em;margin-bottom:.2rem}
.card-chg{font-size:.7rem;font-weight:500;display:flex;align-items:center;gap:.18rem}
.card-chg.up{color:var(--green)}.card-chg.down{color:var(--red)}.card-chg.flat{color:var(--muted)}
.card-sub{font-size:.6rem;color:var(--muted);font-family:var(--mono);margin-top:.1rem}
.card-accent{height:2px;margin:-0.85rem -1rem 0;margin-top:.55rem;border-radius:0 0 var(--radius) var(--radius)}

.metric-row{display:flex;gap:.55rem;flex-wrap:wrap;margin-bottom:.85rem}
.chip{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.5rem .75rem;flex:1;min-width:110px;box-shadow:var(--shadow)}
.chip-label{font-size:.58rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:.2rem}
.chip-val{font-family:var(--mono);font-size:.92rem;font-weight:500;margin-bottom:.08rem}
.chip-chg{font-size:.63rem;font-weight:500}
.chip-chg.up{color:var(--green)}.chip-chg.down{color:var(--red)}.chip-chg.flat{color:var(--muted)}

/* ── Charts ───────────────────────────────────────────── */
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:.85rem 1rem;box-shadow:var(--shadow);display:flex;flex-direction:column}
.chart-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem;gap:.5rem;flex-wrap:wrap}
.chart-hdr h3{font-family:var(--serif);font-size:.88rem;font-weight:600}
.chart-hdr .csub{font-size:.6rem;color:var(--muted);font-family:var(--mono)}
.chart-wrap{position:relative;height:200px}
canvas{width:100%!important}

/* ── Range buttons ────────────────────────────────────── */
.range-btns{display:flex;gap:.2rem}
.range-btn{font-size:.6rem;font-weight:600;padding:.18rem .42rem;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;font-family:var(--mono)}
.range-btn:hover{border-color:var(--green);color:var(--green)}
.range-btn.active{background:var(--green);border-color:var(--green);color:#fff}

/* ── News Carousel ────────────────────────────────────── */
.news-bar{background:var(--card);border-bottom:1px solid var(--border);padding:.55rem 1.25rem;transition:background .3s;overflow:hidden}
.news-bar-inner{display:flex;align-items:center;gap:.65rem}
.news-label{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--green);font-family:var(--mono);white-space:nowrap;flex-shrink:0}
.news-track-wrap{flex:1;overflow:hidden;position:relative}
.news-track{display:flex;gap:.5rem;transition:transform .45s cubic-bezier(.4,0,.2,1);will-change:transform}
.news-card{flex-shrink:0;width:240px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.5rem .72rem;cursor:pointer;text-decoration:none;display:block;transition:border-color .15s,box-shadow .15s}
.news-card:hover{border-color:var(--green-lt);box-shadow:0 2px 8px rgba(0,0,0,.07)}
.news-src{font-size:.55rem;font-family:var(--mono);font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.15rem}
.news-hl{font-size:.67rem;font-weight:500;line-height:1.35;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.news-age{font-size:.56rem;color:var(--muted);font-family:var(--mono);margin-top:.2rem}
.news-nav{display:flex;gap:.22rem;align-items:center;flex-shrink:0}
.news-nav-btn{width:24px;height:24px;border-radius:5px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;line-height:1}
.news-nav-btn:hover{border-color:var(--green);color:var(--green);background:var(--green-dim)}
.news-nav-btn svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.news-dots{display:flex;gap:.28rem;align-items:center;flex-shrink:0}
.news-dot{width:5px;height:5px;border-radius:50%;background:var(--border);transition:background .2s,transform .2s;cursor:pointer}
.news-dot.active{background:var(--green);transform:scale(1.35)}

/* ── Grid layouts ─────────────────────────────────────── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:.65rem}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.65rem}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:.65rem}
.grid-fx{display:grid;grid-template-columns:1fr 1fr;gap:.65rem}
@media(max-width:900px){.grid-2,.grid-3,.grid-4,.grid-fx{grid-template-columns:1fr 1fr}}
@media(max-width:580px){.grid-2,.grid-3,.grid-4,.grid-fx{grid-template-columns:1fr}}
.mb{margin-bottom:.65rem}

/* ── Stock cards ──────────────────────────────────────── */
.stock-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:.75rem .9rem;box-shadow:var(--shadow);border-top:3px solid var(--border);transition:all .2s}
.stock-card:hover{transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.stk-ticker{font-family:var(--mono);font-size:.68rem;font-weight:700;color:var(--muted);margin-bottom:.2rem}
.stk-name{font-size:.68rem;color:var(--muted);margin-bottom:.35rem}
.stk-price{font-family:var(--serif);font-size:1.25rem;font-weight:700;margin-bottom:.12rem}
.stk-chg{font-size:.7rem;font-weight:500}
.stk-chg.up{color:var(--green)}.stk-chg.down{color:var(--red)}.stk-chg.flat{color:var(--muted)}

/* ── Sector heatmap ───────────────────────────────────── */
.sector-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.35rem}
.sector-cell{border-radius:7px;padding:.45rem .6rem;transition:opacity .2s;cursor:default}
.sc-name{font-size:.58rem;text-transform:uppercase;letter-spacing:.04em;opacity:.75;margin-bottom:.1rem}
.sc-val{font-family:var(--mono);font-size:.85rem;font-weight:700}

/* ── Property ─────────────────────────────────────────── */
.city-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.45rem}
.city-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.6rem .75rem;box-shadow:var(--shadow)}
.city-name{font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:.25rem}
.city-price{font-family:var(--mono);font-size:.88rem;font-weight:500;margin-bottom:.12rem}
.city-chg{font-size:.65rem;font-weight:500}
.city-chg.up{color:var(--green)}.city-chg.down{color:var(--red)}
.city-meta{font-size:.58rem;color:var(--muted);margin-top:.15rem;line-height:1.4}

/* ── Trade partner bars ───────────────────────────────── */
.partner-list{display:flex;flex-direction:column;gap:.38rem}
.partner-row{display:flex;align-items:center;gap:.45rem;font-size:.7rem}
.pname{width:85px;flex-shrink:0;color:var(--muted);font-weight:500}
.pbar-track{flex:1;background:var(--surface);border-radius:3px;height:9px;overflow:hidden}
.pbar-fill{height:100%;border-radius:3px;transition:width .5s ease}
.ppct{width:32px;text-align:right;font-family:var(--mono);font-weight:500;font-size:.68rem}

/* ── Yield curve ──────────────────────────────────────── */
.yield-list{display:flex;flex-direction:column}
.yield-row{display:flex;align-items:center;gap:.65rem;padding:.38rem 0;border-bottom:1px solid var(--border);font-size:.76rem}
.yield-row:last-child{border-bottom:none}
.yield-lbl{width:100px;color:var(--muted);font-weight:500;flex-shrink:0}
.yield-val{font-family:var(--mono);font-weight:700;width:52px;color:var(--green)}
.yield-bar-wrap{flex:1;background:var(--surface);border-radius:3px;height:5px}
.yield-bar{height:100%;border-radius:3px;background:var(--green)}

/* ── RBA table ────────────────────────────────────────── */
.rba-table{width:100%;border-collapse:collapse;font-size:.74rem}
.rba-table th{font-size:.58rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:.38rem .65rem;text-align:left;border-bottom:1px solid var(--border);background:var(--surface)}
.rba-table td{padding:.42rem .65rem;border-bottom:1px solid var(--border)}
.rba-table tr:last-child td{border-bottom:none}
.rba-table tr:hover td{background:var(--surface)}
.rba-badge{font-size:.53rem;padding:.1rem .3rem;border-radius:3px;font-weight:700;font-family:var(--mono)}

/* ── Overview page ────────────────────────────────────── */
.overview-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.65rem}
@media(max-width:1000px){.overview-grid{grid-template-columns:1fr 1fr}}
@media(max-width:580px){.overview-grid{grid-template-columns:1fr}}
.ov-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.1rem;box-shadow:var(--shadow);cursor:pointer;transition:all .2s;text-decoration:none;color:inherit;display:block}
.ov-card:hover{border-color:var(--green-lt);transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.ov-num{font-size:.6rem;font-family:var(--mono);color:var(--muted);margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.08em}
.ov-title{font-family:var(--serif);font-size:.95rem;font-weight:700;margin-bottom:.5rem;line-height:1.2}
.ov-metrics{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.5rem}
.ov-metric{display:flex;flex-direction:column}
.ov-metric-label{font-size:.55rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.ov-metric-val{font-family:var(--mono);font-size:.82rem;font-weight:500}
.ov-desc{font-size:.68rem;color:var(--muted);line-height:1.5}
.ov-arrow{font-size:.75rem;color:var(--green);float:right;margin-top:.25rem}

/* ── Explainer panel ──────────────────────────────────── */
.explainer{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-top:.85rem}
.explainer-head{display:flex;align-items:center;justify-content:space-between;padding:.55rem .85rem;cursor:pointer;user-select:none;font-size:.7rem;font-weight:600;color:var(--muted)}
.explainer-head:hover{color:var(--text)}
.explainer-toggle{font-size:.55rem;transition:transform .2s;flex-shrink:0}
.explainer.open .explainer-toggle{transform:rotate(180deg)}
.explainer-body{display:none;padding:.65rem .85rem;flex-direction:column;gap:.5rem;border-top:1px solid var(--border)}
.explainer.open .explainer-body{display:flex}
.expl-row{display:flex;gap:.6rem;font-size:.72rem;line-height:1.55}
.expl-sig{font-size:.6rem;font-weight:700;padding:.15rem .4rem;border-radius:4px;white-space:nowrap;flex-shrink:0;height:fit-content;margin-top:.15rem;font-family:var(--mono)}
.expl-sig.up{background:var(--green-dim);color:var(--green)}
.expl-sig.down{background:var(--red-dim);color:var(--red)}
.expl-sig.watch{background:var(--gold-dim);color:var(--gold)}
.expl-sig.note{background:var(--blue-dim);color:var(--blue)}
.expl-text{color:var(--muted)}
.expl-text strong{color:var(--text)}

/* ── Static note ──────────────────────────────────────── */
.static-note{font-size:.6rem;color:var(--muted);font-style:italic;padding:.28rem .6rem;background:var(--surface);border-radius:4px;border-left:2px solid var(--border);margin-top:.45rem}

/* ── Loading / Error ──────────────────────────────────── */
#loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:1rem;color:var(--muted)}
#loading-overlay h3{font-family:var(--serif);font-size:1.1rem;color:var(--text)}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
.error-box{background:var(--red-dim);border:1px solid #e8b4b4;border-radius:var(--radius);padding:1.25rem;color:#8b2020;margin:1.5rem 1.25rem}

/* ── Misc ─────────────────────────────────────────────── */
.up{color:var(--green)}.down{color:var(--red)}.flat{color:var(--muted)}
.mono{font-family:var(--mono)}
footer{padding:1rem 1.25rem;text-align:center;font-size:.65rem;color:var(--muted);border-top:1px solid var(--border)}
footer a{color:var(--green);text-decoration:none}
</style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <h3>Loading Australian Economy Data</h3>
  <p style="font-size:.8rem">Fetching latest market &amp; economic indicators…</p>
</div>

<!-- ── Masthead ── -->
<header class="masthead">
  <div class="masthead-inner">
    <a class="logo" href="#slide-0">
      <div class="au-flag">
        <svg viewBox="0 0 28 16" xmlns="http://www.w3.org/2000/svg">
          <rect width="28" height="16" fill="#00008B"/>
          <line x1="0" y1="0" x2="13" y2="8" stroke="#fff" stroke-width="1.5"/>
          <line x1="13" y1="0" x2="0" y2="8" stroke="#fff" stroke-width="1.5"/>
          <line x1="0" y1="4" x2="13" y2="4" stroke="#fff" stroke-width="2.5"/>
          <line x1="6.5" y1="0" x2="6.5" y2="8" stroke="#fff" stroke-width="2.5"/>
          <line x1="0" y1="4" x2="13" y2="4" stroke="#C8102E" stroke-width="1.2"/>
          <line x1="6.5" y1="0" x2="6.5" y2="8" stroke="#C8102E" stroke-width="1.2"/>
          <text x="6.5" y="13.5" text-anchor="middle" fill="#fff" font-size="6" font-weight="bold">★</text>
          <text x="20" y="4"   text-anchor="middle" fill="#fff" font-size="3.5">★</text>
          <text x="23" y="7"   text-anchor="middle" fill="#fff" font-size="3">★</text>
          <text x="20" y="11"  text-anchor="middle" fill="#fff" font-size="3.5">★</text>
          <text x="17" y="8"   text-anchor="middle" fill="#fff" font-size="3">★</text>
          <text x="21.5" y="9" text-anchor="middle" fill="#fff" font-size="2">★</text>
        </svg>
      </div>
      AU Economy
    </a>
    <nav class="slide-nav" id="slide-nav"></nav>
    <div class="mhd-right">
      <span class="last-upd" id="last-upd">—</span>
      <button class="btn-icon" onclick="toggleTheme()" title="Toggle dark mode">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="theme-icon">
          <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
      <button id="refresh-btn" onclick="loadData()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
        Refresh
      </button>
    </div>
  </div>
</header>

<!-- ── Ticker ── -->
<div class="ticker"><div class="ticker-inner" id="ticker">Loading market data…</div></div>

<!-- ── News Carousel ── -->

<!-- ── Main content (injected by JS) ── -->
<main id="main"></main>

<footer>
  Australian Economy Dashboard · Data via Yahoo Finance, RBA &amp; ABS · Auto-refreshes every 6 hours via GitHub Actions ·
  <a href="https://github.com/adeebkhan01/au-finance-dashboard" target="_blank">GitHub</a>
</footer>

<script>
// ─────────────────────────────────────────────────────────
// Constants & state
// ─────────────────────────────────────────────────────────
let D = null;
let charts = {};
let activeSlide = 'slide-0';

const SLIDES = [
  { id:'slide-0', label:'Overview',            icon:'🏠' },
  { id:'slide-1', label:'AUD & FX',            icon:'💱' },
  { id:'slide-2', label:'Interest Rates',      icon:'🏦' },
  { id:'slide-3', label:'Inflation & CPI',     icon:'📈' },
  { id:'slide-4', label:'Commodities',         icon:'⛏️' },
  { id:'slide-5', label:'Trade Balance',       icon:'🚢' },
  { id:'slide-6', label:'ASX Markets',         icon:'📊' },
  { id:'slide-7', label:'Property',            icon:'🏘️' },
  { id:'slide-8', label:'Consumer & Labour',   icon:'👥' },
];

// ─────────────────────────────────────────────────────────
// Utils
// ─────────────────────────────────────────────────────────
const esc = s => String(s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
const fmt   = (n,d=2) => n==null ? '—' : n.toLocaleString('en-AU',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtM  = n => n==null ? '—' : '$'+Math.round(n/1000)+'k';
const pct   = (v,d=1) => v==null ? '—' : fmt(v,d)+'%';
const r2    = n => Math.round(n*100)/100;

function chg(v, sfx='%', d=2) {
  if (v==null||isNaN(v)) return '<span class="flat">—</span>';
  const cls = v>0?'up':v<0?'down':'flat';
  const arr = v>0?'▲':v<0?'▼':'—';
  return `<span class="${cls}">${arr} ${Math.abs(v).toFixed(d)}${sfx}</span>`;
}

function timeAgo(s) {
  if (!s) return '';
  const d = (Date.now()-Date.parse(s))/1000;
  if (d<60) return 'just now';
  if (d<3600) return Math.floor(d/60)+'m ago';
  if (d<86400) return Math.floor(d/3600)+'h ago';
  return Math.floor(d/86400)+'d ago';
}

function isDark() { return document.body.classList.contains('dark'); }

function chartColors() {
  const dk = isDark();
  return {
    grid: dk?'#282828':'#edeade', tick: dk?'#888':'#9a9080',
    bg:   dk?'#222':'#fff',      text: dk?'#e8e6e1':'#1a1a18',
    tt:  { bg: dk?'#2a2a2a':'#fff', border: dk?'#444':'#ddd9cf' },
  };
}

function baseOpts(extra={}) {
  const c = chartColors();
  return {
    responsive:true, maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{
      legend:{display:false},
      tooltip:{backgroundColor:c.tt.bg,titleColor:c.text,bodyColor:c.text,borderColor:c.tt.border,borderWidth:1,padding:9,titleFont:{family:'DM Mono',size:10},bodyFont:{family:'DM Mono',size:11,weight:'500'},displayColors:false,cornerRadius:6},
    },
    scales:{
      x:{grid:{color:c.grid,drawBorder:false},ticks:{font:{family:'DM Mono',size:9},color:c.tick,maxRotation:0,maxTicksLimit:8}},
      y:{grid:{color:c.grid,drawBorder:false},ticks:{font:{family:'DM Mono',size:9},color:c.tick}},
    },
    ...extra,
  };
}

function histLabels(h) {
  return h.map(p=>{ const d=p.date.split('-'); return d[2]+'/'+d[1]; });
}

function lineDs(h, color, label='', fill=true) {
  const isUp = h.length>1 && h[h.length-1].close >= h[0].close;
  const bg = fill ? color.replace(')',',0.07)').replace('rgb','rgba') : 'transparent';
  return { label, data:h.map(p=>p.close), borderColor:color, backgroundColor:bg, fill, tension:.35, pointRadius:0, pointHoverRadius:4, borderWidth:2 };
}

function indexedDs(stocks) {
  return stocks.filter(s=>(s.history||[]).length>1).map(s=>{
    const h = s.history, base = h[0].close;
    return { label:s.ticker, data:h.map(p=>p.close!=null?r2((p.close/base)*100):null), borderColor:s.color, backgroundColor:'transparent', tension:.3, pointRadius:0, pointHoverRadius:4, borderWidth:2 };
  });
}

function mkChart(id, type, data, opts) {
  const el = document.getElementById(id); if (!el) return null;
  if (charts[id]) { try{charts[id].destroy()}catch(e){} }
  charts[id] = new Chart(el, {type, data, options:baseOpts(opts||{})});
  return charts[id];
}

// ─────────────────────────────────────────────────────────
// Theme
// ─────────────────────────────────────────────────────────
function toggleTheme() {
  document.body.classList.toggle('dark');
  const dk = isDark();
  localStorage.setItem('au-theme', dk?'dark':'light');
  document.getElementById('theme-icon').innerHTML = dk
    ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
    : '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>';
  rebuildAllCharts();
}
if (localStorage.getItem('au-theme')==='dark') {
  document.body.classList.add('dark');
  document.getElementById('theme-icon').innerHTML='<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
}

// ─────────────────────────────────────────────────────────
// Navigation
// ─────────────────────────────────────────────────────────
// Build nav buttons
const navEl = document.getElementById('slide-nav');
SLIDES.forEach((s, i) => {
  const b = document.createElement('button');
  b.className = 'snav-btn' + (s.id==='slide-0'?' active':'');
  b.textContent = i === 0 ? '⌂ Home' : String(i).padStart(2,'0') + ' · ' + s.label;
  b.dataset.id = s.id;
  b.onclick = () => scrollTo(s.id);
  navEl.appendChild(b);
});

function scrollTo(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
}

// IntersectionObserver for active nav highlighting
let obsTimer = null;
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting && e.intersectionRatio > 0.15) {
      const id = e.target.id;
      if (id !== activeSlide) {
        activeSlide = id;
        document.querySelectorAll('.snav-btn').forEach(b => b.classList.toggle('active', b.dataset.id===id));
      }
    }
  });
}, { threshold:[0.15, 0.5] });

// ─────────────────────────────────────────────────────────
// Ticker
// ─────────────────────────────────────────────────────────
function renderTicker(d) {
  const items = [];
  if (d.asx200?.value)       items.push({n:'ASX 200',  v:Math.round(d.asx200.value).toLocaleString(), c:d.asx200.changePercent});
  if (d.fx?.audusd?.value)   items.push({n:'AUD/USD',  v:d.fx.audusd.value.toFixed(4),                c:d.fx.audusd.changePercent});
  if (d.fx?.audcny?.value)   items.push({n:'AUD/CNY',  v:d.fx.audcny.value.toFixed(4),                c:d.fx.audcny.changePercent});
  if (d.rbaRate?.value)      items.push({n:'RBA Rate', v:d.rbaRate.value.toFixed(2)+'%',              c:null});
  if (d.cpi?.headline)       items.push({n:'CPI',      v:d.cpi.headline.toFixed(1)+'%',               c:null});
  if (d.energy?.wti?.value)  items.push({n:'WTI Oil',  v:'$'+d.energy.wti.value.toFixed(2),           c:d.energy.wti.changePercent});
  if (d.ironOre?.price)      items.push({n:'Iron Ore', v:'$'+d.ironOre.price.toFixed(1),              c:d.ironOre.changePercent});
  (d.banks||[]).forEach(b => { if (b.price) items.push({n:b.ticker, v:'$'+b.price.toFixed(2), c:b.changePercent}); });
  document.getElementById('ticker').innerHTML = items.map((it,i)=>{
    const cls=(it.c||0)>=0?'up':'down';
    const cs=it.c!=null?`<span class="tchg ${cls}">${it.c>=0?'+':''}${it.c.toFixed(2)}%</span>`:'';
    return (i?'<span class="tsep"></span>':'')+`<span class="titem"><span class="tname">${it.n}</span> <span>${it.v}</span>${cs}</span>`;
  }).join('');
}

// ─────────────────────────────────────────────────────────
// Explainer helper
// ─────────────────────────────────────────────────────────
function explainer(rows) {
  const inner = rows.map(r=>`
    <div class="expl-row">
      <span class="expl-sig ${r.type}">${r.label}</span>
      <span class="expl-text">${r.text}</span>
    </div>`).join('');
  return `
    <div class="explainer" onclick="this.classList.toggle('open')">
      <div class="explainer-head">
        <span>📖 How to read this slide</span>
        <span class="explainer-toggle">▼</span>
      </div>
      <div class="explainer-body">${inner}</div>
    </div>`;
}

// ─────────────────────────────────────────────────────────
// SLIDE 0: Overview / Home
// ─────────────────────────────────────────────────────────
function buildSlide0(d) {
  const ovCards = [
    {
      id:'slide-1', num:'01', title:'AUD & FX', icon:'💱',
      metrics:[
        {label:'AUD/USD', val:d.fx?.audusd?.value?.toFixed(4)||'—', chg:d.fx?.audusd?.changePercent},
        {label:'AUD/CNY', val:d.fx?.audcny?.value?.toFixed(4)||'—', chg:d.fx?.audcny?.changePercent},
      ],
      desc:'4 currency pairs with 1M–3Y charts. AUD moves as a proxy for commodity demand and China growth.',
    },
    {
      id:'slide-2', num:'02', title:'Interest Rates & RBA', icon:'🏦',
      metrics:[
        {label:'Cash Rate', val:d.rbaRate?.value!=null?d.rbaRate.value.toFixed(2)+'%':'—', chg:null},
        {label:'10-Yr Bond', val:d.bonds?.tenYear!=null?d.bonds.tenYear.toFixed(2)+'%':'—', chg:null},
      ],
      desc:'RBA cash rate, yield curve, and full rate decision history. Critical for mortgages and the AUD.',
    },
    {
      id:'slide-3', num:'03', title:'Inflation & CPI', icon:'📈',
      metrics:[
        {label:'CPI (Headline)', val:d.cpi?.headline!=null?d.cpi.headline.toFixed(1)+'%':'—', chg:d.cpi?.change},
        {label:'Trimmed Mean', val:d.cpi?.trimmedMean!=null?d.cpi.trimmedMean.toFixed(1)+'%':'—', chg:null},
      ],
      desc:'Headline and trimmed mean CPI vs the RBA 2–3% target band. Wages and GDP growth context.',
    },
    {
      id:'slide-4', num:'04', title:'Commodities & Energy', icon:'⛏️',
      metrics:[
        {label:'Iron Ore', val:d.ironOre?.price!=null?'$'+d.ironOre.price.toFixed(1)+' USD/t':'—', chg:d.ironOre?.changePercent},
        {label:'Brent Crude', val:d.energy?.brent?.value!=null?'$'+d.energy.brent.value.toFixed(2):'—', chg:d.energy?.brent?.changePercent},
      ],
      desc:'Iron ore, oil, gas and coal prices plus FMG, RIO, BHP and WDS stock performance.',
    },
    {
      id:'slide-5', num:'05', title:'Trade Balance', icon:'🚢',
      metrics:[
        {label:'Balance', val:d.trade?.balance!=null?'$'+(d.trade.balance/1000).toFixed(1)+'B':'—', chg:null},
        {label:'China Share', val:d.trade?.partners?.[0]?.exportShare+'%'||'—', chg:null},
      ],
      desc:'Monthly trade surplus, export/import trends, and partner breakdown. China takes ~33% of exports.',
    },
    {
      id:'slide-6', num:'06', title:'ASX Markets', icon:'📊',
      metrics:[
        {label:'ASX 200', val:d.asx200?.value!=null?Math.round(d.asx200.value).toLocaleString():'—', chg:d.asx200?.changePercent},
        {label:'CBA', val:d.banks?.[0]?.price!=null?'$'+d.banks[0].price.toFixed(2):'—', chg:d.banks?.[0]?.changePercent},
      ],
      desc:'ASX 200 index, sector heat map, Big 4 banks, and key commodity stocks — all in one view.',
    },
    {
      id:'slide-7', num:'07', title:'Property Market', icon:'🏘️',
      metrics:[
        {label:'Sydney Median', val:fmtM(d.housing?.cities?.[0]?.median), chg:d.housing?.cities?.[0]?.changePercent},
        {label:'Clearance Rate', val:d.housing?.auctionNational!=null?d.housing.auctionNational+'%':'—', chg:null},
      ],
      desc:'Median prices, auction clearance rates, rental yields, and days on market for 8 capital cities.',
    },
    {
      id:'slide-8', num:'08', title:'Consumer & Labour', icon:'👥',
      metrics:[
        {label:'Unemployment', val:d.unemployment?.value!=null?d.unemployment.value.toFixed(1)+'%':'—', chg:d.unemployment?.change},
        {label:'Sentiment', val:d.consumerConfidence?.value!=null?d.consumerConfidence.value.toFixed(1):'—', chg:null},
      ],
      desc:'Consumer confidence, retail sales, unemployment, participation rate and wage growth combined.',
    },
  ];

  const cards = ovCards.map(c => {
    const mHtml = c.metrics.map(m => {
      const cHtml = m.chg!=null ? ` <span class="${m.chg>=0?'up':'down'}" style="font-size:.6rem">${m.chg>=0?'▲':'▼'} ${Math.abs(m.chg).toFixed(2)}%</span>` : '';
      return `<div class="ov-metric"><span class="ov-metric-label">${esc(m.label)}</span><span class="ov-metric-val">${esc(m.val)}${cHtml}</span></div>`;
    }).join('');
    return `<a class="ov-card" href="#${c.id}">
      <div class="ov-num">${c.num} · ${c.icon}</div>
      <div class="ov-title">${esc(c.title)}</div>
      <div class="ov-metrics">${mHtml}</div>
      <div class="ov-desc">${esc(c.desc)}</div>
      <span class="ov-arrow">→</span>
    </a>`;
  }).join('');

  const fetchDate = d.fetchedAt ? new Date(d.fetchedAt).toLocaleString('en-AU',{weekday:'long',day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';

  return `
    <section class="slide" id="slide-0">
      <div class="slide-hdr">
        <div class="slide-hdr-left">
          <div class="slide-num-label">Home · Overview</div>
          <div class="slide-title">Daily Briefing</div>
          <div class="slide-sub">Click any card to jump to that section, or scroll down to read through all 8 views.</div>
        </div>
        <div class="slide-asof">${esc(fetchDate)}</div>
      </div>
      <div class="overview-grid">${cards}</div>
    </section>`;
}

// ─────────────────────────────────────────────────────────
// SLIDE 1: AUD & FX (4 charts × 4 ranges)
// ─────────────────────────────────────────────────────────
function buildSlide1(d) {
  const fx = d.fx||{};
  const pairs = ['audusd','audeur','audcny','audjpy'];
  const labels = {'audusd':'AUD / USD','audeur':'AUD / EUR','audcny':'AUD / CNY','audjpy':'AUD / JPY'};

  const chips = pairs.map(k => {
    const q = fx[k];
    const dec = k==='audjpy'?2:4;
    return `<div class="chip">
      <div class="chip-label">${esc(labels[k])}</div>
      <div class="chip-val mono">${q?.value!=null?q.value.toFixed(dec):'—'}</div>
      <div class="chip-chg ${(q?.changePercent||0)>=0?'up':'down'}">${chg(q?.changePercent)}</div>
    </div>`;
  }).join('');

  const chartCards = pairs.map(k => {
    const q = fx[k];
    return `<div class="chart-card">
      <div class="chart-hdr">
        <h3>${esc(labels[k])}</h3>
        <div class="range-btns">
          ${['1M','3M','6M','3Y'].map(r=>`<button class="range-btn${r==='1M'?' active':''}" data-pair="${k}" data-range="${r}" onclick="setFXRange('${k}','${r}',this)">${r}</button>`).join('')}
        </div>
      </div>
      <div class="chart-wrap"><canvas id="chart-fx-${k}"></canvas></div>
    </div>`;
  }).join('');

  return `
    <section class="slide" id="slide-1">
      <div class="slide-hdr">
        <div class="slide-hdr-left">
          <div class="slide-num-label">Slide 1 of 8</div>
          <div class="slide-title">AUD &amp; Foreign Exchange</div>
          <div class="slide-sub">Live rates · Toggle 1M / 3M / 6M / 3Y on each chart</div>
        </div>
        <div class="slide-asof">Live · ${new Date().toLocaleDateString('en-AU',{day:'numeric',month:'short'})}</div>
      </div>
      <div class="metric-row">${chips}</div>
      <div class="grid-fx">${chartCards}</div>
      ${explainer([
        {type:'up',    label:'▲ AUD/USD rising',   text:'<strong>Commodity demand is strong</strong>, China growing, or global risk appetite is on. The US dollar is weakening. Good for importers and foreign travel, but reduces export competitiveness.'},
        {type:'down',  label:'▼ AUD/USD falling',  text:'<strong>Commodity prices weakening</strong>, China demand slowing, or the US dollar strengthening. Classic risk-off signal. Good for Australian exporters and inbound tourism.'},
        {type:'watch', label:'👀 AUD/CNY divergence', text:'If AUD/CNY falls while AUD/USD holds steady, the issue is <strong>China-specific</strong>, not a broad USD move. This is the most important pair for Australia\'s trade balance.'},
        {type:'note',  label:'📌 Why AUD moves early', text:'The AUD is often a leading indicator of commodity sentiment — it typically moves <strong>before</strong> iron ore spot prices do, making it a useful signal for miners and trade.'},
      ])}
    </section>`;
}

// FX range toggle (called from range buttons)
function setFXRange(pairKey, range, btn) {
  // Always update active button state first so the UI responds immediately
  document.querySelectorAll(`[data-pair="${pairKey}"]`).forEach(b => b.classList.toggle('active', b.dataset.range===range));
  const fx = D?.fx?.[pairKey]; if (!fx) return;
  const histMap = { '1M': fx.history, '3M': fx.h3m, '6M': fx.h6m, '3Y': fx.h3y };
  const hist = histMap[range];
  if (!hist?.length) return;
  const chart = charts['chart-fx-'+pairKey]; if (!chart) return;
  // Update colour to reflect direction for the selected range
  const isUp = hist[hist.length-1].close >= hist[0].close;
  const col = isUp ? 'rgb(26,122,74)' : 'rgb(194,58,58)';
  const bg  = isUp ? 'rgba(26,122,74,0.07)' : 'rgba(194,58,58,0.07)';
  chart.data.labels = histLabels(hist);
  chart.data.datasets[0].data = hist.map(p=>p.close);
  chart.data.datasets[0].borderColor = col;
  chart.data.datasets[0].backgroundColor = bg;
  chart.update('none');
}

// ─────────────────────────────────────────────────────────
// SLIDE 2: Interest Rates & RBA
// ─────────────────────────────────────────────────────────
function buildSlide2(d) {
  const b = d.bonds||{};
  const yields = [
    {label:'Cash Rate (RBA)', v:b.cash,       max:6},
    {label:'2-Year Bond',     v:b.twoYear,    max:6},
    {label:'5-Year Bond',     v:b.fiveYear,   max:6},
    {label:'10-Year Bond',    v:b.tenYear,    max:6},
    {label:'30-Year Bond',    v:b.thirtyYear, max:6},
    {label:'US 10-Year',      v:b.usTenYear,  max:6},
  ];
  const yieldRows = yields.map(y=>`<div class="yield-row">
    <span class="yield-lbl">${esc(y.label)}</span>
    <span class="yield-val">${y.v!=null?y.v.toFixed(2)+'%':'—'}</span>
    <div class="yield-bar-wrap"><div class="yield-bar" style="width:${y.v!=null?Math.min((y.v/y.max)*100,100):0}%"></div></div>
  </div>`).join('');

  const rbaRows = (d.rbaHistory||[]).slice(0,8).map(r=>{
    const bg = r.change>0?'background:var(--red-dim);color:var(--red)':r.change<0?'background:var(--green-dim);color:var(--green)':'background:var(--surface);color:var(--muted)';
    const badge = r.change>0?'HIKE':r.change<0?'CUT':'HOLD';
    return `<tr><td>${esc(r.date)}</td><td class="mono" style="font-weight:600">${r.rate.toFixed(2)}%</td>
      <td><span class="rba-badge" style="${bg}">${badge}</span></td>
      <td style="font-size:.68rem;color:var(--muted)">${esc(r.note||'')}</td></tr>`;
  }).join('');

  return `
    <section class="slide" id="slide-2">
      <div class="slide-hdr">
        <div class="slide-hdr-left">
          <div class="slide-num-label">Slide 2 of 8</div>
          <div class="slide-title">Interest Rates &amp; RBA</div>
          <div class="slide-sub">Cash rate · Yield curve · Rate decision log</div>
        </div>
        <div class="slide-asof">Bonds: ${esc(b.asOf||'—')}</div>
      </div>
      <div class="metric-row">
        <div class="chip"><div class="chip-label">RBA Cash Rate</div><div class="chip-val up">${d.rbaRate?.value!=null?d.rbaRate.value.toFixed(2)+'%':'—'}</div><div class="chip-chg ${(d.rbaRate?.change||0)<0?'up':'down'}">${chg(d.rbaRate?.change,'bps',2)} vs prior</div></div>
        <div class="chip"><div class="chip-label">2-Year Bond</div><div class="chip-val mono">${b.twoYear!=null?b.twoYear.toFixed(2)+'%':'—'}</div><div class="chip-chg flat">Govt. security</div></div>
        <div class="chip"><div class="chip-label">10-Year Bond</div><div class="chip-val mono">${b.tenYear!=null?b.tenYear.toFixed(2)+'%':'—'}</div><div class="chip-chg flat">Govt. security</div></div>
        <div class="chip"><div class="chip-label">10y–2y Spread</div><div class="chip-val ${(b.spread10v2||0)>=0?'up':'down'} mono">${b.spread10v2!=null?b.spread10v2.toFixed(2)+'%':'—'}</div><div class="chip-chg flat">${b.spread10v2>=0?'Normal curve':'Inverted ⚠️'}</div></div>
        <div class="chip"><div class="chip-label">Next RBA Meeting</div><div class="chip-val">${esc(d.rbaRate?.nextMeeting||'—')}</div><div class="chip-chg flat">Scheduled</div></div>
      </div>
      <div class="grid-2 mb">
        <div class="chart-card">
          <div class="chart-hdr"><h3>Australian Yield Curve</h3><span class="csub">${esc(b.asOf||'')}</span></div>
          <div style="flex:1;overflow-y:auto;padding:.25rem 0">${yieldRows}</div>

// ─────────────────────────────────────────────────────────
// News Carousel
// ─────────────────────────────────────────────────────────
let _newsIdx = 0;
let _newsMax = 0;
let _newsTimer = null;

function _newsAge(pubDate) {
  if (!pubDate) return '';
  const ms = Date.now() - Date.parse(pubDate);
  if (isNaN(ms) || ms < 0) return '';
  const m = Math.floor(ms / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

function _newsGo(i) {
  _newsIdx = Math.max(0, Math.min(i, _newsMax));
  const card = document.querySelector('.news-card');
  const gap = 8;
  const w = card ? card.offsetWidth + gap : 248;
  document.getElementById('news-track').style.transform = `translateX(-${_newsIdx * w}px)`;
  document.querySelectorAll('.news-dot').forEach((d, j) => d.classList.toggle('active', j === _newsIdx));
}

function _newsKick() {
  clearInterval(_newsTimer);
  _newsTimer = setInterval(() => _newsGo(_newsIdx >= _newsMax ? 0 : _newsIdx + 1), 5500);
}

function renderNews(news) {
  const bar = document.getElementById('news-bar');
  if (!news?.length) return; // stay hidden
  const top10 = news.slice(0, 10);
  const track = document.getElementById('news-track');
  const dotsEl = document.getElementById('news-dots');

  track.innerHTML = top10.map(n => `<a class="news-card" href="${esc(n.link||'#')}" target="_blank" rel="noopener noreferrer">
    <div class="news-src">${esc(n.source||'News')}</div>
    <div class="news-hl">${esc(n.title||'')}</div>
    <div class="news-age">${_newsAge(n.pubDate)}</div>
  </a>`).join('');

  bar.style.display = '';

  // After paint: compute visible card count from wrapper width
  requestAnimationFrame(() => {
    const wrapW = document.querySelector('.news-track-wrap')?.offsetWidth || 700;
    const cardW = 240 + 8;
    const visible = Math.max(1, Math.floor(wrapW / cardW));
    _newsMax = Math.max(0, top10.length - visible);
    dotsEl.innerHTML = Array.from({length: _newsMax + 1}, (_, i) =>
      `<span class="news-dot${i===0?' active':''}" onclick="_newsGo(${i});_newsKick()"></span>`).join('');
    document.getElementById('news-prev').onclick = () => { _newsGo(_newsIdx - 1); _newsKick(); };
    document.getElementById('news-next').onclick = () => { _newsGo(_newsIdx + 1); _newsKick(); };
    _newsKick();
  });
}

// ─────────────────────────────────────────────────────────
// Render all slides
// ─────────────────────────────────────────────────────────
function renderAll(d) {
  const html = [
    buildSlide0(d),
    buildSlide1(d),
    buildSlide2(d),
    buildSlide3(d),
    buildSlide4(d),
    buildSlide5(d),
    buildSlide6(d),
    buildSlide7(d),
    buildSlide8(d),
  ].join('');

  document.getElementById('main').innerHTML = html;

  // Observe all slides for active nav
  document.querySelectorAll('.slide').forEach(el => obs.observe(el));

  // Build all charts after DOM is painted
  requestAnimationFrame(() => setTimeout(buildAllCharts, 50));
}

// ─────────────────────────────────────────────────────────
// Data load
// ─────────────────────────────────────────────────────────
async function loadData() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  try {
    const base = window.location.pathname.replace(/[^/]*$/,'');
    const res = await fetch(base+'finance-data.json?t='+Date.now());
    if (!res.ok) throw new Error('HTTP '+res.status);
    D = await res.json();

    if (D.fetchedAt) {
      const f = new Date(D.fetchedAt);
      document.getElementById('last-upd').textContent =
        f.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+' · '+
        f.toLocaleDateString('en-AU',{day:'numeric',month:'short'});
    }

    renderTicker(D);
    renderNews(D.news);
    renderAll(D);
    document.getElementById('loading-overlay').style.display = 'none';
  } catch(e) {
    document.getElementById('loading-overlay').style.display = 'none';
    document.getElementById('main').innerHTML =
      `<div class="error-box"><strong>Waiting for first data fetch.</strong><br>
      Go to your repo → Actions → Fetch Finance Data → Run workflow.<br>
      <small style="opacity:.7">Error: ${esc(e.message)}</small></div>`;
  }
  btn.classList.remove('spinning');
}

loadData();
</script>
