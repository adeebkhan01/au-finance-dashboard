<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Australian Economy Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f2eb;--surface:#edeade;--card:#ffffff;--border:#ddd9cf;
  --green:#1a7a4a;--green-lt:#22915c;--green-dim:#e6f2ec;
  --red:#c23a3a;--red-dim:#fdf0f0;
  --text:#1a1a18;--muted:#7a7568;
  --blue:#2563eb;--blue-dim:#eff6ff;
  --gold:#b8860b;--gold-dim:#fef9ee;
  --purple:#7c3aed;--purple-dim:#f3f0f9;
  --serif:'Playfair Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --mono:'DM Mono',monospace;
  --radius:10px;--shadow:0 1px 3px rgba(0,0,0,.04);--shadow-lg:0 8px 24px rgba(0,0,0,.08);
}
.dark{
  --bg:#141414;--surface:#1e1e1e;--card:#242424;--border:#333;
  --text:#e8e6e1;--muted:#8a8578;
  --green-dim:#1a2e22;--red-dim:#2e1a1a;--blue-dim:#1a1e2e;
  --gold-dim:#2e2a1a;--purple-dim:#231a2e;
  --shadow:0 1px 3px rgba(0,0,0,.2);--shadow-lg:0 8px 24px rgba(0,0,0,.3);
}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-weight:300;min-height:100vh;transition:background .3s,color .3s;overflow:hidden;display:flex;flex-direction:column}

/* ── Masthead ── */
.masthead{border-bottom:1px solid var(--border);background:var(--surface);padding:0 1.25rem;flex-shrink:0;transition:background .3s}
.masthead-inner{max-width:100%;display:flex;align-items:center;gap:.6rem;height:50px}
.logo{font-family:var(--serif);font-size:1.1rem;font-weight:700;color:var(--green);letter-spacing:-.02em;display:flex;align-items:center;gap:.4rem;text-decoration:none;white-space:nowrap}
.au-flag{width:26px;height:15px;border-radius:2px;overflow:hidden;flex-shrink:0;background:#00008B}
.au-flag svg{width:100%;height:100%}
.slide-nav{display:flex;gap:.2rem;margin-left:.5rem;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none}
.slide-nav::-webkit-scrollbar{display:none}
.slide-nav-btn{width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.65rem;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--mono);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.slide-nav-btn:hover{border-color:var(--green);color:var(--green)}
.slide-nav-btn.active{background:var(--green);border-color:var(--green);color:#fff}
.masthead-right{margin-left:auto;display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.last-updated{font-size:.65rem;color:var(--muted);font-family:var(--mono);white-space:nowrap}
.btn-icon{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.btn-icon:hover{border-color:var(--green);color:var(--green)}
#refresh-btn{font-size:.72rem;font-weight:500;background:var(--green);color:#fff;border:1px solid var(--green);border-radius:6px;padding:.28rem .6rem;cursor:pointer;display:flex;align-items:center;gap:.3rem;transition:background .15s;white-space:nowrap}
#refresh-btn:hover{background:#155f39}
#refresh-btn.spinning svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Ticker ── */
.ticker{background:var(--card);border-bottom:1px solid var(--border);padding:.4rem 1.25rem;overflow:hidden;flex-shrink:0}
.ticker-inner{display:flex;gap:1.25rem;align-items:center;font-size:.68rem;font-family:var(--mono);overflow-x:auto;scrollbar-width:none}
.ticker-inner::-webkit-scrollbar{display:none}
.ticker-item{display:flex;align-items:center;gap:.35rem;white-space:nowrap;flex-shrink:0}
.ticker-item .tname{color:var(--muted);font-weight:500}
.ticker-item .tval{font-weight:500}
.ticker-item .tchg.up{color:var(--green)}
.ticker-item .tchg.down{color:var(--red)}
.ticker-sep{width:1px;height:12px;background:var(--border);flex-shrink:0}

/* ── Slide container ── */
.slides-wrap{flex:1;overflow:hidden;position:relative;min-height:0}
.slide{display:none;height:100%;overflow-y:auto;padding:1rem 1.25rem .5rem;flex-direction:column;gap:.75rem}
.slide.active{display:flex}
.slide-header{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-shrink:0}
.slide-title-group{}
.slide-num{font-size:.62rem;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem}
.slide-title{font-family:var(--serif);font-size:1.3rem;font-weight:700;color:var(--text);line-height:1.2}
.slide-context{font-size:.72rem;color:var(--muted);max-width:380px;line-height:1.5;margin-top:.3rem}
.slide-asof{font-size:.62rem;font-family:var(--mono);color:var(--muted);text-align:right;flex-shrink:0}

/* ── Slide body layouts ── */
.slide-body{display:grid;gap:.65rem;flex:1;min-height:0}
.layout-2col{grid-template-columns:1fr 1fr}
.layout-3col{grid-template-columns:repeat(3,1fr)}
.layout-left-wide{grid-template-columns:3fr 2fr}
.layout-right-wide{grid-template-columns:2fr 3fr}
.layout-metrics-chart{grid-template-columns:220px 1fr}
.layout-4col{grid-template-columns:repeat(4,1fr)}
@media(max-width:900px){
  .layout-2col,.layout-3col,.layout-left-wide,.layout-right-wide,.layout-metrics-chart,.layout-4col{grid-template-columns:1fr}
}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:.85rem 1rem;box-shadow:var(--shadow);transition:all .2s}
.card-sm{padding:.65rem .85rem}
.card:hover{border-color:var(--green-lt);transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.card-title{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:.45rem;display:flex;align-items:center;gap:.35rem}
.card-title .dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.card-big-val{font-family:var(--serif);font-size:1.65rem;font-weight:700;line-height:1.1;letter-spacing:-.02em;margin-bottom:.2rem}
.card-change{font-size:.72rem;font-weight:500;display:flex;align-items:center;gap:.2rem;margin-bottom:.15rem}
.card-change.up{color:var(--green)}
.card-change.down{color:var(--red)}
.card-change.flat{color:var(--muted)}
.card-sub{font-size:.62rem;color:var(--muted);font-family:var(--mono)}
.card-accent{height:2px;border-radius:0 0 var(--radius) var(--radius);margin:-0.85rem -1rem 0;margin-top:.5rem}

/* ── Metric row (horizontal) ── */
.metric-row{display:flex;gap:.65rem;flex-wrap:wrap;flex-shrink:0}
.metric-chip{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.5rem .75rem;flex:1;min-width:100px;box-shadow:var(--shadow)}
.metric-chip-label{font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:.2rem}
.metric-chip-val{font-family:var(--mono);font-size:.95rem;font-weight:500;margin-bottom:.1rem}
.metric-chip-chg{font-size:.65rem;font-weight:500}
.metric-chip-chg.up{color:var(--green)}
.metric-chip-chg.down{color:var(--red)}
.metric-chip-chg.flat{color:var(--muted)}

/* ── Charts ── */
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:.85rem 1rem;box-shadow:var(--shadow);display:flex;flex-direction:column;min-height:0}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem;flex-shrink:0}
.chart-header h3{font-family:var(--serif);font-size:.88rem;font-weight:600}
.chart-header .chart-sub{font-size:.62rem;color:var(--muted);font-family:var(--mono)}
.chart-wrap{position:relative;flex:1;min-height:120px}
canvas{width:100%!important}

/* ── Sector heatmap ── */
.sector-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.4rem}
.sector-cell{border-radius:7px;padding:.5rem .65rem;font-size:.72rem;font-weight:500;transition:opacity .2s}
.sector-cell .sc-name{font-size:.6rem;text-transform:uppercase;letter-spacing:.04em;opacity:.8;margin-bottom:.15rem}
.sector-cell .sc-val{font-family:var(--mono);font-size:.88rem;font-weight:600}

/* ── Property city grid ── */
.city-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:.5rem}
.city-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.65rem .8rem;box-shadow:var(--shadow)}
.city-name{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:.3rem}
.city-price{font-family:var(--mono);font-size:.9rem;font-weight:500;margin-bottom:.15rem}
.city-chg{font-size:.68rem;font-weight:500}
.city-chg.up{color:var(--green)}
.city-chg.down{color:var(--red)}
.city-meta{font-size:.6rem;color:var(--muted);margin-top:.2rem}

/* ── RBA history table ── */
.rba-table{width:100%;border-collapse:collapse;font-size:.75rem}
.rba-table th{font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:.4rem .65rem;text-align:left;border-bottom:1px solid var(--border);background:var(--surface)}
.rba-table td{padding:.45rem .65rem;border-bottom:1px solid var(--border)}
.rba-table tr:last-child td{border-bottom:none}
.rba-table tr:hover td{background:var(--surface)}
.rba-badge{font-size:.55rem;padding:.1rem .3rem;border-radius:3px;font-weight:700;font-family:var(--mono)}

/* ── Indicators table ── */
.ind-table{width:100%;border-collapse:collapse;font-size:.75rem}
.ind-table th{font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:.4rem .65rem;text-align:left;border-bottom:1px solid var(--border);background:var(--surface)}
.ind-table td{padding:.45rem .65rem;border-bottom:1px solid var(--border)}
.ind-table tr:last-child td{border-bottom:none}
.ind-table tr:hover td{background:var(--surface)}
.ind-badge{font-size:.55rem;padding:.1rem .3rem;border-radius:3px;font-weight:600;text-transform:uppercase}

/* ── Stock comparison cards ── */
.stock-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.65rem;flex-shrink:0}
.stock-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:.75rem .9rem;box-shadow:var(--shadow);border-top:3px solid var(--border);transition:all .2s}
.stock-card:hover{transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.stock-ticker{font-family:var(--mono);font-size:.7rem;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:.25rem}
.stock-name{font-size:.7rem;color:var(--muted);margin-bottom:.4rem}
.stock-price{font-family:var(--serif);font-size:1.3rem;font-weight:700;margin-bottom:.15rem}
.stock-chg{font-size:.72rem;font-weight:500}
.stock-chg.up{color:var(--green)}
.stock-chg.down{color:var(--red)}
.stock-chg.flat{color:var(--muted)}

/* ── Trade partner bars ── */
.partner-bar-wrap{display:flex;flex-direction:column;gap:.4rem}
.partner-row{display:flex;align-items:center;gap:.5rem;font-size:.72rem}
.partner-name{width:80px;flex-shrink:0;color:var(--muted);font-weight:500}
.partner-bar-track{flex:1;background:var(--surface);border-radius:4px;height:10px;overflow:hidden}
.partner-bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
.partner-pct{width:35px;text-align:right;font-family:var(--mono);font-weight:500}

/* ── Yield curve ── */
.yield-row{display:flex;align-items:center;gap:.75rem;padding:.35rem 0;border-bottom:1px solid var(--border);font-size:.78rem}
.yield-row:last-child{border-bottom:none}
.yield-label{width:90px;color:var(--muted);font-weight:500}
.yield-val{font-family:var(--mono);font-weight:600;width:55px}
.yield-bar-wrap{flex:1;background:var(--surface);border-radius:3px;height:6px}
.yield-bar{height:100%;border-radius:3px;background:var(--green)}

/* ── Bottom navigation ── */
.slide-footer{background:var(--surface);border-top:1px solid var(--border);padding:.45rem 1.25rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.slide-footer-label{font-family:var(--serif);font-size:.85rem;font-weight:600;color:var(--text)}
.slide-footer-sub{font-size:.62rem;font-family:var(--mono);color:var(--muted);margin-top:.1rem}
.nav-arrows{display:flex;gap:.5rem;align-items:center}
.nav-arrow{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:.85rem}
.nav-arrow:hover{border-color:var(--green);color:var(--green)}
.nav-arrow:disabled{opacity:.3;cursor:default}
.slide-counter{font-family:var(--mono);font-size:.72rem;color:var(--muted);min-width:50px;text-align:center}

/* ── Loading/error ── */
.loading-full{display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:1rem;color:var(--muted)}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
.error-box{background:var(--red-dim);border:1px solid #e8b4b4;border-radius:var(--radius);padding:1.25rem;color:#8b2020;margin:1rem}

/* ── Utilities ── */
.up{color:var(--green)}.down{color:var(--red)}.flat{color:var(--muted)}
.mono{font-family:var(--mono)}
.bold{font-weight:600}
.section-label{font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:.35rem}
.static-note{font-size:.6rem;color:var(--muted);font-style:italic;padding:.3rem .6rem;background:var(--surface);border-radius:4px;border-left:2px solid var(--border)}
</style>
</head>
<body>

<!-- ── Masthead ── -->
<header class="masthead">
  <div class="masthead-inner">
    <a class="logo" href="#">
      <div class="au-flag">
        <svg viewBox="0 0 28 16" xmlns="http://www.w3.org/2000/svg">
          <rect width="28" height="16" fill="#00008B"/>
          <line x1="0" y1="0" x2="13" y2="8" stroke="#fff" stroke-width="1.5"/>
          <line x1="13" y1="0" x2="0" y2="8" stroke="#fff" stroke-width="1.5"/>
          <line x1="0" y1="4" x2="13" y2="4" stroke="#fff" stroke-width="2.5"/>
          <line x1="6.5" y1="0" x2="6.5" y2="8" stroke="#fff" stroke-width="2.5"/>
          <line x1="0" y1="4" x2="13" y2="4" stroke="#C8102E" stroke-width="1.2"/>
          <line x1="6.5" y1="0" x2="6.5" y2="8" stroke="#C8102E" stroke-width="1.2"/>
          <text x="6.5" y="13.5" text-anchor="middle" fill="#fff" font-size="6" font-weight="bold">★</text>
          <text x="20" y="4"  text-anchor="middle" fill="#fff" font-size="3.5">★</text>
          <text x="23" y="7"  text-anchor="middle" fill="#fff" font-size="3">★</text>
          <text x="20" y="11" text-anchor="middle" fill="#fff" font-size="3.5">★</text>
          <text x="17" y="8"  text-anchor="middle" fill="#fff" font-size="3">★</text>
          <text x="21.5" y="9" text-anchor="middle" fill="#fff" font-size="2">★</text>
        </svg>
      </div>
      AU Economy
    </a>
    <nav class="slide-nav" id="slide-nav"></nav>
    <div class="masthead-right">
      <span class="last-updated" id="last-updated">—</span>
      <button class="btn-icon" id="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="theme-icon">
          <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
      <button id="refresh-btn" onclick="loadData()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="23 4 23 10 17 10"/>
          <polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
        Refresh
      </button>
    </div>
  </div>
</header>

<!-- ── Ticker ── -->
<div class="ticker"><div class="ticker-inner" id="ticker">Loading...</div></div>

<!-- ── Slides ── -->
<div class="slides-wrap" id="slides-wrap">
  <div class="loading-full" id="loading-state">
    <div class="spinner"></div>
    <div>Loading Australian Economy Data...</div>
  </div>
  <!-- slides injected by JS -->
</div>

<!-- ── Footer nav ── -->
<div class="slide-footer" id="slide-footer" style="display:none">
  <div>
    <div class="slide-footer-label" id="footer-title">—</div>
    <div class="slide-footer-sub" id="footer-sub">Use ← → arrow keys to navigate</div>
  </div>
  <div class="nav-arrows">
    <button class="nav-arrow" id="btn-prev" onclick="navigate(-1)">&#8592;</button>
    <span class="slide-counter" id="slide-counter">1 / 12</span>
    <button class="nav-arrow" id="btn-next" onclick="navigate(1)">&#8594;</button>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────
let D = null;          // finance-data.json
let currentSlide = 0;  // 0-indexed
let charts = {};
let loading = false;

const SLIDE_META = [
  { title: 'AUD & FX',               sub: 'AUD/USD · AUD/EUR · AUD/CNY · AUD/JPY' },
  { title: 'Interest Rates & RBA',    sub: 'Cash rate · Bond yields · RBA history' },
  { title: 'Inflation & CPI',         sub: 'Headline · Trimmed mean · RBA target band' },
  { title: 'Iron Ore & Steel',        sub: 'Spot price · China steel · Key miners' },
  { title: 'Energy Dashboard',        sub: 'WTI · Brent · Natural Gas · Coal' },
  { title: 'Trade Balance',           sub: 'Exports · Imports · Partner breakdown' },
  { title: 'ASX 200 Overview',        sub: 'Index · Sector heat map · 30-day trend' },
  { title: 'Big 4 Banks',             sub: 'CBA · NAB · ANZ · WBC' },
  { title: 'Commodity Stocks',        sub: 'BHP · RIO · FMG · WDS' },
  { title: 'Property Market',         sub: 'Median prices · Clearance rates · Cities' },
  { title: 'Consumer & Retail',       sub: 'Westpac sentiment · Retail sales · Business confidence' },
  { title: 'Labour Market',           sub: 'Unemployment · Participation · Wages · Vacancies' },
];

// ── Utils ────────────────────────────────────────────────
const esc = s => String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'})[m]);
const fmt = (n,d=2) => n==null?'—':n.toLocaleString('en-AU',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtM = n => n==null?'—':'$'+Math.round(n/1000)+'k';
const pct = (v,d=2) => v==null?'—':fmt(v,d)+'%';
function chgHtml(v,sfx='%',d=2){
  if(v==null||isNaN(v)) return '<span class="flat">—</span>';
  const cls=v>0?'up':v<0?'down':'flat';
  const arr=v>0?'▲':v<0?'▼':'—';
  return `<span class="${cls}">${arr} ${Math.abs(v).toFixed(d)}${sfx}</span>`;
}
function timeAgo(s){
  if(!s) return '';
  const d=(Date.now()-Date.parse(s))/1000;
  if(d<60) return 'just now';
  if(d<3600) return Math.floor(d/60)+'m ago';
  if(d<86400) return Math.floor(d/3600)+'h ago';
  return Math.floor(d/86400)+'d ago';
}
function isDark(){return document.body.classList.contains('dark')}
function chartColors(){
  return {
    grid: isDark()?'#2a2a2a':'#edeade',
    tick: isDark()?'#8a8578':'#9a9080',
    bg:   isDark()?'#1e1e1e':'#fff',
    text: isDark()?'#e8e6e1':'#1a1a18',
    tooltip:{bg:isDark()?'#2a2a2a':'#fff',border:isDark()?'#444':'#ddd9cf'}
  };
}
function baseChartOpts(extra={}){
  const c=chartColors();
  return {
    responsive:true, maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{
      legend:{display:false},
      tooltip:{backgroundColor:c.tooltip.bg,titleColor:c.text,bodyColor:c.text,borderColor:c.tooltip.border,borderWidth:1,padding:9,titleFont:{family:'DM Mono',size:10},bodyFont:{family:'DM Mono',size:11,weight:'500'},displayColors:false,cornerRadius:6}
    },
    scales:{
      x:{grid:{color:c.grid,drawBorder:false},ticks:{font:{family:'DM Mono',size:9},color:c.tick,maxRotation:0,maxTicksLimit:7}},

// ── Theme ────────────────────────────────────────────────
function toggleTheme(){
  document.body.classList.toggle('dark');
  const dark=isDark();
  localStorage.setItem('au-theme',dark?'dark':'light');
  document.getElementById('theme-icon').innerHTML = dark
    ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
    : '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>';
  if(D) rebuildCharts();
}
if(localStorage.getItem('au-theme')==='dark'){
  document.body.classList.add('dark');
  document.getElementById('theme-icon').innerHTML='<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
}

// ── Navigation ───────────────────────────────────────────
function navigate(dir){
  const next=currentSlide+dir;
  if(next<0||next>=SLIDE_META.length) return;
  showSlide(next);
}
function showSlide(idx){
  document.querySelectorAll('.slide').forEach((s,i)=>{
    s.classList.toggle('active',i===idx);
  });
  document.querySelectorAll('.slide-nav-btn').forEach((b,i)=>{
    b.classList.toggle('active',i===idx);
  });
  document.getElementById('footer-title').textContent = SLIDE_META[idx].title;
  document.getElementById('footer-sub').textContent   = SLIDE_META[idx].sub;
  document.getElementById('slide-counter').textContent = `${idx+1} / ${SLIDE_META.length}`;
  document.getElementById('btn-prev').disabled = idx===0;
  document.getElementById('btn-next').disabled = idx===SLIDE_META.length-1;
  currentSlide=idx;
  // Build this slide's charts lazily
  if(D) buildSlideCharts(idx);
}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown') navigate(1);
  if(e.key==='ArrowLeft' ||e.key==='ArrowUp')   navigate(-1);
});

// Build slide-nav buttons
const nav=document.getElementById('slide-nav');
SLIDE_META.forEach((_,i)=>{
  const b=document.createElement('button');
  b.className='slide-nav-btn'+(i===0?' active':'');
  b.textContent=i+1;
  b.title=SLIDE_META[i].title;
  b.onclick=()=>showSlide(i);
  nav.appendChild(b);
});

// ── Ticker ───────────────────────────────────────────────
function renderTicker(d){
  const items=[];
  if(d.asx200?.value)     items.push({n:'ASX 200',v:Math.round(d.asx200.value).toLocaleString(),c:d.asx200.changePercent});
  if(d.fx?.audusd?.value) items.push({n:'AUD/USD',v:d.fx.audusd.value.toFixed(4),c:d.fx.audusd.changePercent});
  if(d.fx?.audcny?.value) items.push({n:'AUD/CNY',v:d.fx.audcny.value.toFixed(4),c:d.fx.audcny.changePercent});
  if(d.rbaRate?.value)    items.push({n:'RBA Rate',v:d.rbaRate.value.toFixed(2)+'%',c:null});
  if(d.cpi?.headline)     items.push({n:'CPI',v:d.cpi.headline.toFixed(1)+'%',c:null});
  if(d.energy?.wti?.value) items.push({n:'WTI Oil',v:'$'+d.energy.wti.value.toFixed(2),c:d.energy.wti.changePercent});
  if(d.ironOre?.price)    items.push({n:'Iron Ore',v:'$'+d.ironOre.price.toFixed(1),c:d.ironOre.changePercent});
  (d.banks||[]).forEach(b=>{ if(b.price) items.push({n:b.ticker,v:'$'+b.price.toFixed(2),c:b.changePercent}); });
  document.getElementById('ticker').innerHTML = items.map((it,i)=>{
    const cls=(it.c||0)>=0?'up':'down';
    const cStr=it.c!=null?`<span class="tchg ${cls}">${it.c>=0?'+':''}${it.c.toFixed(2)}%</span>`:'';
    return (i?'<span class="ticker-sep"></span>':'')+`<span class="ticker-item"><span class="tname">${it.n}</span><span class="tval">${it.v}</span>${cStr}</span>`;
  }).join('');
}

// ── Render all slides ────────────────────────────────────
function renderSlides(d){

// ── Chart builders ───────────────────────────────────────
function lineDataset(history,color,label=''){
  return {label,data:history.map(p=>p.close??p),borderColor:color,backgroundColor:color.replace(')',',0.07)').replace('rgb','rgba'),fill:true,tension:.35,pointRadius:0,pointHoverRadius:4,borderWidth:2};
}
function indexedDatasets(stocks,field='history'){
  return stocks.filter(s=>(s[field]||[]).length>1).map(s=>{
    const h=s[field];
    const base=h[0].close;
    return {label:s.ticker,data:h.map(p=>p.close!=null?round2((p.close/base)*100):null),borderColor:s.color,backgroundColor:'transparent',tension:.3,pointRadius:0,pointHoverRadius:4,borderWidth:2};
  });
}
function round2(n){return Math.round(n*100)/100}
function histLabels(history){return history.map(p=>{const d=p.date.split('-');return d[2]+'/'+d[1];})}

function buildSlideCharts(idx){
  if(!D) return;
  const c=chartColors();
  const key='slide'+(idx+1);
  Object.keys(charts).filter(k=>k.startsWith(key)).forEach(k=>{if(charts[k]){charts[k].destroy();delete charts[k];}});

  function mkChart(id,type,data,opts){
    const el=document.getElementById(id); if(!el) return;
    if(charts[id]) charts[id].destroy();
    charts[id]=new Chart(el,{type,data,options:baseChartOpts(opts||{})});
  }

  if(idx===0){ // AUD & FX
    const audusd=D.fx?.audusd?.history;
    const audcny=D.fx?.audcny?.history;
    if(audusd?.length) mkChart('chart-audusd','line',{labels:histLabels(audusd),datasets:[lineDataset(audusd,'rgb(26,122,74)')]});
    if(audcny?.length) mkChart('chart-audcny','line',{labels:histLabels(audcny),datasets:[lineDataset(audcny,'rgb(37,99,235)')]});
  }

  if(idx===1){ // RBA
    const h=D.rbaHistory||[];
    const rev=[...h].reverse();
    mkChart('chart-rba','bar',{
      labels:rev.map(r=>r.date),
      datasets:[{label:'Cash Rate',data:rev.map(r=>r.rate),backgroundColor:rev.map(r=>r.change>0?'rgba(194,58,58,.7)':r.change<0?'rgba(26,122,74,.7)':'rgba(150,150,150,.4)'),borderRadius:4}]
    },{scales:{y:{min:0,max:6,...baseChartOpts().scales?.y}}});
  }

  if(idx===2){ // CPI
    const h=D.cpiHistory||[];
    mkChart('chart-cpi','line',{
      labels:h.map(p=>p.period),
      datasets:[
        {label:'Headline',data:h.map(p=>p.headline),borderColor:'rgb(194,58,58)',backgroundColor:'rgba(194,58,58,.06)',fill:true,tension:.3,pointRadius:3,borderWidth:2},
        {label:'Trimmed Mean',data:h.map(p=>p.trimmedMean),borderColor:'rgb(37,99,235)',backgroundColor:'transparent',tension:.3,pointRadius:3,borderWidth:2},
      ]
    },{plugins:{...baseChartOpts().plugins,legend:{display:true,position:'top',labels:{font:{family:'DM Mono',size:10},color:c.tick,boxWidth:12}}}});
    mkChart('chart-cpi-band','line',{
      labels:h.map(p=>p.period),
      datasets:[
        {label:'Headline CPI',data:h.map(p=>p.headline),borderColor:'rgb(184,134,11)',backgroundColor:'rgba(184,134,11,.06)',fill:true,tension:.3,pointRadius:3,borderWidth:2},
        {label:'Target Low',data:h.map(()=>2),borderColor:'rgba(26,122,74,.4)',backgroundColor:'transparent',borderDash:[4,4],pointRadius:0,borderWidth:1.5},
        {label:'Target High',data:h.map(()=>3),borderColor:'rgba(26,122,74,.4)',backgroundColor:'rgba(26,122,74,.05)',fill:'-1',borderDash:[4,4],pointRadius:0,borderWidth:1.5},
      ]
    },{plugins:{...baseChartOpts().plugins,legend:{display:true,position:'top',labels:{font:{family:'DM Mono',size:10},color:c.tick,boxWidth:12}}}});
  }

  if(idx===3){ // Iron Ore
    const io=D.ironOreHistory||[];
    mkChart('chart-ironore','line',{
      labels:io.map(p=>p.month),
      datasets:[{label:'Iron Ore',data:io.map(p=>p.price),borderColor:'rgb(184,134,11)',backgroundColor:'rgba(184,134,11,.07)',fill:true,tension:.3,pointRadius:4,borderWidth:2}]
    });
    const fmg=(D.commodityStocks||[]).find(s=>s.ticker==='FMG');
    const rio=(D.commodityStocks||[]).find(s=>s.ticker==='RIO');
    const miners=[fmg,rio].filter(Boolean);
    if(miners.length){
      const labels=miners[0].history?.map(p=>{const d=p.date.split('-');return d[2]+'/'+d[1];})||[];
      mkChart('chart-miners','line',{labels,datasets:indexedDatasets(miners)},{plugins:{...baseChartOpts().plugins,legend:{display:true,position:'top',labels:{font:{family:'DM Mono',size:10},color:c.tick,boxWidth:12}}}});
    }
  }

  if(idx===4){ // Energy
    const wtiH=D.energy?.wti?.history;
    const gasH=D.energy?.gas?.history;
    if(wtiH?.length) mkChart('chart-wti','line',{labels:histLabels(wtiH),datasets:[lineDataset(wtiH,'rgb(124,58,237)')]});
    if(gasH?.length) mkChart('chart-gas','line',{labels:histLabels(gasH),datasets:[lineDataset(gasH,'rgb(194,58,58)')]});
  }

  if(idx===5){ // Trade
    const h=D.trade?.history||[];
    mkChart('chart-trade','bar',{
      labels:h.map(p=>p.month),
      datasets:[
        {label:'Exports',data:h.map(p=>p.exports),backgroundColor:'rgba(26,122,74,.7)',borderRadius:3},
        {label:'Imports',data:h.map(p=>p.imports),backgroundColor:'rgba(194,58,58,.6)',borderRadius:3},
        {label:'Balance',data:h.map(p=>p.balance),type:'line',borderColor:'rgb(184,134,11)',backgroundColor:'transparent',tension:.3,pointRadius:4,borderWidth:2,yAxisID:'y2'},
      ]
    },{
      plugins:{...baseChartOpts().plugins,legend:{display:true,position:'top',labels:{font:{family:'DM Mono',size:10},color:c.tick,boxWidth:12}}},
      scales:{...baseChartOpts().scales,y2:{type:'linear',position:'right',grid:{drawOnChartArea:false},ticks:{font:{family:'DM Mono',size:9},color:c.tick}}}
    });
  }

  if(idx===6){ // ASX
    const asxH=D.asx200?.history;
    if(asxH?.length) mkChart('chart-asx','line',{labels:histLabels(asxH),datasets:[lineDataset(asxH,(D.asx200?.changePercent||0)>=0?'rgb(26,122,74)':'rgb(194,58,58)')]});
  }

  if(idx===7){ // Banks
    const banks=D.banks||[];
    const labels=banks.find(b=>b.history?.length)?.history?.map(p=>{const d=p.date.split('-');return d[2]+'/'+d[1];})||[];
    if(labels.length) mkChart('chart-banks','line',{labels,datasets:indexedDatasets(banks)},{plugins:{...baseChartOpts().plugins,legend:{display:true,position:'top',labels:{font:{family:'DM Mono',size:10},color:c.tick,boxWidth:12}}}});
  }

  if(idx===8){ // Commodity stocks
    const cs=D.commodityStocks||[];
    const labels=cs.find(s=>s.history?.length)?.history?.map(p=>{const d=p.date.split('-');return d[2]+'/'+d[1];})||[];
    if(labels.length) mkChart('chart-commstocks','line',{labels,datasets:indexedDatasets(cs)},{plugins:{...baseChartOpts().plugins,legend:{display:true,position:'top',labels:{font:{family:'DM Mono',size:10},color:c.tick,boxWidth:12}}}});
  }

  if(idx===9){ // Property
    const cities=(D.housing?.cities||[]);
    mkChart('chart-property','bar',{
      labels:cities.map(c=>c.city),
      datasets:[{
        label:'Median Price',
        data:cities.map(c=>c.median),
        backgroundColor:cities.map(c=>c.changePercent>5?'rgba(26,122,74,.75)':c.changePercent<0?'rgba(194,58,58,.65)':'rgba(37,99,235,.65)'),
        borderRadius:5,
      }]
    },{scales:{y:{ticks:{callback:v=>'$'+Math.round(v/1000)+'k',...baseChartOpts().scales.y.ticks},...baseChartOpts().scales.y},...baseChartOpts().scales}});
  }

  if(idx===10){ // Consumer
    const h=D.consumerHistory||[];
    mkChart('chart-confidence','line',{
      labels:h.map(p=>p.period),
      datasets:[
        {label:'Consumer Confidence',data:h.map(p=>p.confidence),borderColor:'rgb(26,122,74)',backgroundColor:'rgba(26,122,74,.06)',fill:true,tension:.35,pointRadius:3,borderWidth:2},
        {label:'Benchmark 100',data:h.map(()=>100),borderColor:'rgba(150,150,150,.5)',backgroundColor:'transparent',borderDash:[4,4],pointRadius:0,borderWidth:1.5},
      ]
    },{plugins:{...baseChartOpts().plugins,legend:{display:true,position:'top',labels:{font:{family:'DM Mono',size:10},color:c.tick,boxWidth:12}}}});
    mkChart('chart-retail','bar',{
      labels:h.filter(p=>p.retail!=null).map(p=>p.period),
      datasets:[{
        label:'Retail MoM',
        data:h.filter(p=>p.retail!=null).map(p=>p.retail),
        backgroundColor:h.filter(p=>p.retail!=null).map(p=>p.retail>=0?'rgba(26,122,74,.75)':'rgba(194,58,58,.7)'),
        borderRadius:4,
      }]
    });
  }

  if(idx===11){ // Labour
    const h=D.labourHistory||[];
    mkChart('chart-labour','line',{
      labels:h.map(p=>p.period),
      datasets:[
        {label:'Unemployment %',data:h.map(p=>p.unemployment),borderColor:'rgb(194,58,58)',backgroundColor:'rgba(194,58,58,.06)',fill:true,tension:.3,pointRadius:3,borderWidth:2},
        {label:'Participation %',data:h.map(p=>p.participation),borderColor:'rgb(37,99,235)',backgroundColor:'transparent',tension:.3,pointRadius:3,borderWidth:2,yAxisID:'y2'},
      ]
    },{
      plugins:{...baseChartOpts().plugins,legend:{display:true,position:'top',labels:{font:{family:'DM Mono',size:10},color:c.tick,boxWidth:12}}},
      scales:{...baseChartOpts().scales,y:{min:0,max:6,...baseChartOpts().scales.y},y2:{type:'linear',position:'right',min:65,max:70,grid:{drawOnChartArea:false},ticks:{font:{family:'DM Mono',size:9},color:c.tick,callback:v=>v+'%'}}}
    });
    const rbaH=[...( D.rbaHistory||[])].reverse();
    mkChart('chart-labour-rba','line',{
      labels:h.map(p=>p.period),
      datasets:[
        {label:'Unemployment',data:h.map(p=>p.unemployment),borderColor:'rgb(194,58,58)',backgroundColor:'transparent',tension:.3,pointRadius:3,borderWidth:2},
        {label:'RBA Rate',data:h.map(p=>{
          const m=rbaH.slice().reverse().find(r=>r.date.includes(p.period.split(' ')[1]));
          return m?.rate??null;
        }),borderColor:'rgb(26,122,74)',backgroundColor:'transparent',tension:.3,pointRadius:3,borderWidth:2,borderDash:[3,3]},
      ]
    },{plugins:{...baseChartOpts().plugins,legend:{display:true,position:'top',labels:{font:{family:'DM Mono',size:10},color:c.tick,boxWidth:12}}}});
  }
}

function rebuildCharts(){
  Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});
  charts={};
  buildSlideCharts(currentSlide);
}

// ── Data load ────────────────────────────────────────────
async function loadData(){
  if(loading) return;
  loading=true;
  const btn=document.getElementById('refresh-btn');
  btn.classList.add('spinning');

  try {
    const base=window.location.pathname.replace(/[^/]*$/,'');
    const res=await fetch(base+'finance-data.json?t='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    D=await res.json();

    if(D.fetchedAt){
      const f=new Date(D.fetchedAt);
      document.getElementById('last-updated').textContent=
        f.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+' · '+
        f.toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});
    }

    document.getElementById('loading-state').style.display='none';
    renderTicker(D);
    renderSlides(D);

  } catch(e) {
    document.getElementById('slides-wrap').innerHTML=
      `<div class="error-box"><strong>Waiting for first data fetch</strong><br>
      Go to your repo ► Actions tab ► Fetch Finance Data ► Run workflow.<br>
      <small style="opacity:.7">Error: ${esc(e.message)}</small></div>`;
    document.getElementById('slide-footer').style.display='flex';
  }

  btn.classList.remove('spinning');
  loading=false;
}

loadData();
</script>
